<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthik Changal - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
        }

        p {
            font-size: 1.125rem;
            color: #a3a3a3;
            margin-bottom: 3rem;
        }

        .portfolios {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .portfolio-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 3rem;
            background: #141414;
            border: 1px solid #262626;
            border-radius: 1rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            min-width: 200px;
        }

        .portfolio-link:hover {
            border-color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .portfolio-link h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .portfolio-link span {
            font-size: 0.875rem;
            color: #a3a3a3;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            .portfolios {
                flex-direction: column;
            }

            .portfolio-link {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Karthik Changal</h1>
        <p>Choose a portfolio version</p>

        <div class="portfolios">
            <a href="/dark-bento/" class="portfolio-link">
                <h2>Bento Grid</h2>
                <span>Modern layout</span>
            </a>

            <a href="/short-dark/" class="portfolio-link">
                <h2>Classic</h2>
                <span>Single page</span>
            </a>
        </div>
    </div>
</body>

</html>
